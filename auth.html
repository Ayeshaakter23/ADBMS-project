<!DOCTYPE html>
<html lang="en" id="authHtml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduMetrics — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   THEME VARIABLES
═══════════════════════════════════════ */
:root { --transition: 0.3s cubic-bezier(.4,0,.2,1); }

[data-theme="dark"] {
  --bg:           #070d1a;
  --bg2:          #0e1628;
  --surface:      #111827;
  --surface2:     #1a2540;
  --border:       rgba(79,124,255,.14);
  --border2:      rgba(79,124,255,.24);
  --text:         #e8ecf8;
  --text-muted:   #8493b8;
  --text-dim:     #4a5578;
  --accent:       #4f7cff;
  --accent-glow:  rgba(79,124,255,.35);
  --accent-soft:  rgba(79,124,255,.10);
  --green:        #22d3a5;
  --green-soft:   rgba(34,211,165,.10);
  --red:          #ff6b6b;
  --red-soft:     rgba(255,107,107,.10);
  --input-bg:     #0e1628;
  --card-shadow:  0 8px 48px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.3);
  --hero-grad:    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(79,124,255,.18) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 40% at 80% 80%, rgba(34,211,165,.07) 0%, transparent 60%);
}

[data-theme="light"] {
  --bg:           #f0f4ff;
  --bg2:          #e8eeff;
  --surface:      #ffffff;
  --surface2:     #f5f7ff;
  --border:       rgba(26,45,100,.12);
  --border2:      rgba(26,45,100,.22);
  --text:         #111827;
  --text-muted:   #4a5578;
  --text-dim:     #9aa3be;
  --accent:       #3b6aff;
  --accent-glow:  rgba(59,106,255,.20);
  --accent-soft:  rgba(59,106,255,.08);
  --green:        #0fb98a;
  --green-soft:   rgba(15,185,138,.10);
  --red:          #e04444;
  --red-soft:     rgba(224,68,68,.08);
  --input-bg:     #f0f4ff;
  --card-shadow:  0 4px 32px rgba(26,45,100,.12), 0 1px 6px rgba(26,45,100,.06);
  --hero-grad:    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(59,106,255,.10) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 40% at 80% 80%, rgba(15,185,138,.06) 0%, transparent 60%);
}

/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: var(--hero-grad);
  pointer-events: none;
  z-index: 0;
  transition: background var(--transition);
}

/* ═══════════════════════════════════════
   NAVBAR
═══════════════════════════════════════ */
.nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  background: transparent;
  padding: 0 32px;
  height: 66px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo {
  font-family: 'Syne', sans-serif;
  font-size: 20px; font-weight: 800; letter-spacing: -.4px;
  color: var(--text); text-decoration: none;
  display: flex; align-items: center; gap: 10px;
}
.nav-logo-mark {
  width: 32px; height: 32px;
  background: var(--accent); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: #fff;
  box-shadow: 0 0 16px var(--accent-glow);
}
.nav-logo span { color: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 10px; }
.theme-toggle {
  width: 44px; height: 24px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 999px; cursor: pointer;
  position: relative;
  transition: background var(--transition), border-color var(--transition);
}
.theme-toggle-thumb {
  position: absolute; top: 3px; left: 3px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent);
  transition: transform var(--transition);
  box-shadow: 0 0 8px var(--accent-glow);
  display: flex; align-items: center; justify-content: center; font-size: 9px;
}
[data-theme="light"] .theme-toggle-thumb { transform: translateX(20px); }
.theme-label {
  font-size: 12px; font-weight: 500;
  color: var(--text-muted); cursor: pointer; user-select: none;
}
.back-link {
  font-size: 13px; color: var(--text-muted); text-decoration: none;
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: 8px;
  transition: color .2s, background .2s;
}
.back-link:hover { color: var(--text); background: var(--accent-soft); }

/* ═══════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════ */
.auth-wrapper {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 90px 24px 40px;
  position: relative; z-index: 1;
}

/* ═══════════════════════════════════════
   AUTH CARD
═══════════════════════════════════════ */
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 24px;
  padding: 40px;
  width: 100%; max-width: 460px;
  box-shadow: var(--card-shadow);
  transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
  animation: auth-in .5s ease both;
}
@keyframes auth-in {
  from { opacity: 0; transform: translateY(20px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Logo inside card */
.auth-logo {
  text-align: center; margin-bottom: 28px;
}
.auth-logo-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 52px; height: 52px; border-radius: 14px;
  background: var(--accent); margin-bottom: 12px;
  box-shadow: 0 0 24px var(--accent-glow);
  font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 900; color: #fff;
}
.auth-logo-name {
  font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
  color: var(--text); letter-spacing: -.4px;
}
.auth-logo-name span { color: var(--accent); }
.auth-logo-sub {
  font-size: 12px; color: var(--text-muted);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
}

/* Role Tabs */
.role-tabs {
  display: flex; gap: 8px; margin-bottom: 28px;
  background: var(--bg2, var(--bg));
  border: 1px solid var(--border); border-radius: 14px; padding: 5px;
  transition: background var(--transition);
}
.role-tab {
  flex: 1; padding: 10px; border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; border: none; background: none;
  color: var(--text-muted); transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.role-tab.active {
  background: var(--surface2);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
}
[data-theme="dark"] .role-tab.active { background: var(--surface2); }
[data-theme="light"] .role-tab.active { background: #fff; box-shadow: 0 2px 8px rgba(26,45,100,.10); }

/* Mode Toggle (Login / Register) */
.mode-toggle {
  display: flex; align-items: center; gap: 0;
  background: var(--accent-soft);
  border: 1px solid var(--border2); border-radius: 999px;
  padding: 3px; margin-bottom: 28px;
}
.mode-btn {
  flex: 1; padding: 8px 0;
  border-radius: 999px; border: none; background: none;
  font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500;
  cursor: pointer; color: var(--text-muted); transition: all .2s;
}
.mode-btn.active {
  background: var(--accent); color: #fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}

/* Form */
.form-title {
  font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700;
  color: var(--text); margin-bottom: 6px;
}
.form-sub {
  font-size: 13px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.5;
}

.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--text-muted); margin-bottom: 7px; letter-spacing: .4px;
}
.field input, .field select {
  width: 100%; padding: 11px 14px;
  background: var(--input-bg);
  border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.field input:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.field input::placeholder { color: var(--text-dim, var(--text-muted)); }
.field select option { background: var(--surface); color: var(--text); }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Password toggle */
.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 42px; }
.pw-eye {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 16px; padding: 2px;
  transition: color .2s;
}
.pw-eye:hover { color: var(--text); }

/* Submit button */
.submit-btn {
  width: 100%; padding: 13px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
  cursor: pointer; margin-top: 8px;
  transition: opacity .2s, transform .15s, box-shadow .2s;
  box-shadow: 0 4px 20px var(--accent-glow);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.submit-btn:hover { opacity: .92; transform: translateY(-1px); box-shadow: 0 6px 28px var(--accent-glow); }
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* Error / success messages */
.auth-msg {
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
  align-items: center; gap: 8px;
}
.auth-msg.show { display: flex; }
.auth-msg.error { background: var(--red-soft); color: var(--red); border: 1px solid rgba(224,68,68,.25); }
.auth-msg.success { background: var(--green-soft); color: var(--green); border: 1px solid rgba(34,211,165,.25); }

/* Divider */
.auth-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: var(--text-dim); font-size: 12px;
}
.auth-divider::before, .auth-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* Switch link */
.switch-link {
  text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 20px;
}
.switch-link a {
  color: var(--accent); text-decoration: none; font-weight: 500;
}
.switch-link a:hover { text-decoration: underline; }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}

/* Toast */
.toast-area {
  position: fixed; bottom: 28px; right: 28px; z-index: 500;
  display: flex; flex-direction: column; gap: 10px;
}
.toast {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px;
  font-size: 13px; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 6px 28px rgba(0,0,0,.3); max-width: 300px;
  animation: toast-in .3s ease;
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
@keyframes toast-in {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
  <a class="nav-logo" href="/">
    <div class="nav-logo-mark">E</div>
    Edu<span>Metrics</span>
  </a>
  <div class="nav-right">
    <span class="theme-label" onclick="toggleTheme()" id="themeLabel">Light Mode</span>
    <div class="theme-toggle" onclick="toggleTheme()" role="button" aria-label="Toggle theme">
      <div class="theme-toggle-thumb"><span id="themeIcon">☀</span></div>
    </div>
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>
  </div>
</nav>

<!-- MAIN -->
<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-mark">E</div>
      <div class="auth-logo-name">Edu<span>Metrics</span></div>
      <div class="auth-logo-sub">Performance System</div>
    </div>

    <!-- Role Tabs: Student | Teacher -->
    <div class="role-tabs" id="roleTabs">
      <button class="role-tab active" id="tabStudent" onclick="setRole('student')">
        🎓 Student
      </button>
      <button class="role-tab" id="tabTeacher" onclick="setRole('teacher')">
        👨‍🏫 Teacher
      </button>
    </div>

    <!-- Mode Toggle: Login | Register -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeLogin" onclick="setMode('login')">Sign In</button>
      <button class="mode-btn"        id="modeRegister" onclick="setMode('register')">Create Account</button>
    </div>

    <!-- Error / Success message -->
    <div class="auth-msg" id="authMsg">
      <span id="authMsgIcon">⚠</span>
      <span id="authMsgText"></span>
    </div>

    <!-- DYNAMIC FORM -->
    <div id="authForm">
      <!-- Rendered by JS -->
    </div>

  </div>
</div>

<!-- Toast Container -->
<div class="toast-area" id="toastArea"></div>

<script>
/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let currentRole = 'student';   // 'student' | 'teacher'
let currentMode = 'login';     // 'login'   | 'register'

/* ═══════════════════════════════════════
   THEME
═══════════════════════════════════════ */
const htmlEl      = document.getElementById('authHtml');
const themeLabel  = document.getElementById('themeLabel');
const themeIcon   = document.getElementById('themeIcon');

const savedTheme = localStorage.getItem('edumetrics-theme') || 'dark';
htmlEl.setAttribute('data-theme', savedTheme);
applyThemeUI(savedTheme);

function toggleTheme() {
  const next = htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  htmlEl.setAttribute('data-theme', next);
  localStorage.setItem('edumetrics-theme', next);
  applyThemeUI(next);
}

function applyThemeUI(t) {
  themeLabel.textContent = t === 'dark' ? 'Light Mode' : 'Dark Mode';
  themeIcon.textContent  = t === 'dark' ? '☀' : '🌙';
}

/* ═══════════════════════════════════════
   SET ROLE / MODE
═══════════════════════════════════════ */
function setRole(role) {
  currentRole = role;
  document.getElementById('tabStudent').classList.toggle('active', role === 'student');
  document.getElementById('tabTeacher').classList.toggle('active', role === 'teacher');
  hideMsg();
  renderForm();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeLogin').classList.toggle('active', mode === 'login');
  document.getElementById('modeRegister').classList.toggle('active', mode === 'register');
  hideMsg();
  renderForm();
}

/* ═══════════════════════════════════════
   RENDER FORM
═══════════════════════════════════════ */
function renderForm() {
  const isLogin    = currentMode === 'login';
  const isStudent  = currentRole === 'student';
  const titleText  = isLogin
    ? (isStudent ? 'Welcome back, student' : 'Welcome back, teacher')
    : (isStudent ? 'Create a student account' : 'Create a teacher account');
  const subText    = isLogin
    ? 'Enter your credentials to access the dashboard'
    : 'Fill in your details to get started';

  let html = `
    <div class="form-title">${titleText}</div>
    <div class="form-sub">${subText}</div>
  `;

  if (!isLogin) {
    if (isStudent) {
      html += `
        <div class="field-row">
          <div class="field">
            <label>First Name</label>
            <input id="fFirst" type="text" placeholder="e.g. Arif" autocomplete="given-name">
          </div>
          <div class="field">
            <label>Last Name</label>
            <input id="fLast" type="text" placeholder="e.g. Rahman" autocomplete="family-name">
          </div>
        </div>
        <div class="field">
          <label>Class</label>
          <select id="fClass">
            <option value="">Select your class…</option>
            <option>6A</option><option>6B</option>
            <option>7A</option><option>7B</option>
            <option>8A</option><option>8B</option>
            <option>9A</option><option>9B</option>
            <option>10A</option><option>10B</option>
            <option>11A</option><option>11B</option>
            <option>12A</option><option>12B</option>
          </select>
        </div>
      `;
    } else {
      html += `
        <div class="field">
          <label>Full Name</label>
          <input id="fName" type="text" placeholder="e.g. Ms. Fatima Ahmed" autocomplete="name">
        </div>
      `;
    }
  }

  html += `
    <div class="field">
      <label>Email Address</label>
      <input id="fEmail" type="email" placeholder="you@school.edu" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input id="fPassword" type="password" placeholder="${isLogin ? 'Enter your password' : 'Min. 6 characters'}" autocomplete="${isLogin ? 'current-password' : 'new-password'}">
        <button class="pw-eye" type="button" onclick="togglePw()" title="Show/hide password" id="pwEye">👁</button>
      </div>
    </div>
  `;

  if (!isLogin) {
    html += `
      <div class="field">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input id="fConfirm" type="password" placeholder="Re-enter password" autocomplete="new-password">
          <button class="pw-eye" type="button" onclick="toggleConfirm()" title="Show/hide" id="confirmEye">👁</button>
        </div>
      </div>
    `;
  }

  html += `
    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
      ${isLogin ? 'Sign In' : 'Create Account'}
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
    <div class="switch-link">
      ${isLogin
        ? `Don't have an account? <a href="#" onclick="setMode('register');return false">Create one →</a>`
        : `Already have an account? <a href="#" onclick="setMode('login');return false">Sign in →</a>`}
    </div>
  `;

  document.getElementById('authForm').innerHTML = html;

  // Focus first input
  const first = document.getElementById('fFirst') || document.getElementById('fName') || document.getElementById('fEmail');
  if (first) setTimeout(() => first.focus(), 80);

  // Enter key submits
  document.getElementById('authForm').querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
  });
}

/* ═══════════════════════════════════════
   PASSWORD VISIBILITY
═══════════════════════════════════════ */
function togglePw() {
  const f = document.getElementById('fPassword');
  const e = document.getElementById('pwEye');
  if (!f) return;
  f.type = f.type === 'password' ? 'text' : 'password';
  e.textContent = f.type === 'password' ? '👁' : '🙈';
}
function toggleConfirm() {
  const f = document.getElementById('fConfirm');
  const e = document.getElementById('confirmEye');
  if (!f) return;
  f.type = f.type === 'password' ? 'text' : 'password';
  e.textContent = f.type === 'password' ? '👁' : '🙈';
}

/* ═══════════════════════════════════════
   SUBMIT HANDLER
═══════════════════════════════════════ */
async function handleSubmit() {
  hideMsg();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Please wait…';

  try {
    if (currentMode === 'login') {
      await doLogin();
    } else {
      await doRegister();
    }
  } catch(err) {
    showMsg('error', 'Network error — please try again');
  } finally {
    btn.disabled = false;
    renderForm(); // restores button text
  }
}

async function doLogin() {
  const email    = (document.getElementById('fEmail')?.value || '').trim();
  const password = document.getElementById('fPassword')?.value || '';

  if (!email || !password) {
    showMsg('error', 'Please enter your email and password'); return;
  }

  const res  = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password, role: currentRole })
  });
  const data = await res.json();

  if (!res.ok) {
    showMsg('error', data.error || 'Login failed'); return;
  }

  showToast(`Welcome back, ${data.user.name}!`, 'success');
  setTimeout(() => { window.location.href = '/dashboard'; }, 700);
}

async function doRegister() {
  const email    = (document.getElementById('fEmail')?.value || '').trim();
  const password = document.getElementById('fPassword')?.value || '';
  const confirm  = document.getElementById('fConfirm')?.value || '';
  let   name     = '';

  if (currentRole === 'student') {
    const first = (document.getElementById('fFirst')?.value || '').trim();
    const last  = (document.getElementById('fLast')?.value || '').trim();
    if (!first || !last) { showMsg('error', 'Please enter your first and last name'); return; }
    name = `${first} ${last}`;
  } else {
    name = (document.getElementById('fName')?.value || '').trim();
    if (!name) { showMsg('error', 'Please enter your full name'); return; }
  }

  if (!email)     { showMsg('error', 'Please enter your email'); return; }
  if (!password)  { showMsg('error', 'Please enter a password'); return; }
  if (password.length < 6) { showMsg('error', 'Password must be at least 6 characters'); return; }
  if (password !== confirm) { showMsg('error', 'Passwords do not match'); return; }

  const payload = { name, email, password, role: currentRole };
  if (currentRole === 'student') {
    const cls = document.getElementById('fClass')?.value;
    if (!cls) { showMsg('error', 'Please select your class'); return; }
    payload.class = cls;
  }

  const res  = await fetch('/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await res.json();

  if (!res.ok) {
    showMsg('error', data.error || 'Registration failed'); return;
  }

  showToast(`Account created! Welcome, ${data.user.name}!`, 'success');
  setTimeout(() => { window.location.href = '/dashboard'; }, 800);
}

/* ═══════════════════════════════════════
   MESSAGE HELPERS
═══════════════════════════════════════ */
function showMsg(type, text) {
  const el   = document.getElementById('authMsg');
  const icon = document.getElementById('authMsgIcon');
  const txt  = document.getElementById('authMsgText');
  el.className = `auth-msg show ${type}`;
  icon.textContent = type === 'error' ? '⚠' : '✓';
  txt.textContent  = text;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function hideMsg() {
  document.getElementById('authMsg').classList.remove('show');
}

function showToast(msg, type = 'success') {
  const el   = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span style="font-weight:700;color:${type==='success'?'var(--green)':'var(--red)'}">${type==='success'?'✓':'✕'}</span>${msg}`;
  document.getElementById('toastArea').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ═══════════════════════════════════════
   INIT — check URL params
═══════════════════════════════════════ */
(function init() {
  // Check if already logged in
  fetch('/api/me').then(r => {
    if (r.ok) window.location.href = '/dashboard';
  }).catch(() => {});

  // Read URL params for pre-selecting role/mode
  const params = new URLSearchParams(window.location.search);
  const role   = params.get('role');
  const mode   = params.get('mode');
  if (role === 'teacher') { currentRole = 'teacher'; }
  if (mode === 'register') { currentMode = 'register'; }

  // Sync UI state
  document.getElementById('tabStudent').classList.toggle('active', currentRole === 'student');
  document.getElementById('tabTeacher').classList.toggle('active', currentRole === 'teacher');
  document.getElementById('modeLogin').classList.toggle('active', currentMode === 'login');
  document.getElementById('modeRegister').classList.toggle('active', currentMode === 'register');

  renderForm();
})();
</script>
